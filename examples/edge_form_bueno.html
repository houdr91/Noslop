<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caso edge: form funcional con formspree</title>
    <meta name="description" content="Form con action real no debe marcar nada.">
</head>
<body>
    <section id="contact">
        <form action="https://formspree.io/f/abcd1234" method="POST">
            <label>
                Tu email
                <input type="email" name="email" placeholder="hola@ejemplo.es" required>
            </label>
            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
