<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caso edge: linkedin real vs generico</title>
    <meta name="description" content="Tres enlaces a LinkedIn: uno real con handle largo, uno generico (yourname) y uno muy corto (3 chars) que debe quedar amber.">
</head>
<body>
    <section id="hero">
        <h1>Hola soy Marta Gómez diseñadora</h1>
        <p>Trabajo en productos fintech con accesibilidad.</p>
    </section>
    <section id="redes">
        <a href="https://www.linkedin.com/in/martagomezzeledon">LinkedIn real handle largo</a>
        <a href="https://linkedin.com/in/yourname">LinkedIn generico</a>
        <a href="https://linkedin.com/in/ai">LinkedIn handle corto (3 chars)</a>
    </section>
</body>
</html>
